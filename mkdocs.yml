site_name: Unminal Engine Docs
repo_url: https://github.com/dovintc-off/Unminal-Engine
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tracking
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Installation: installation.md
  - Architecture:
    - Main: core/main.md
    - Core Systems:
      - Commands: 
        - Executed Methods: core/commands/executed_methods.md
        - Class Commands: core/commands/structure.md
      - Camera: core/camera.md
      - Object Loader: core/obj_loader.md
      - Engine Values: core/state.md
    - Rendering:
      - Primitive Shapes:
        - Primitive: render/primitive/primitive.md
        - Square: render/primitive/square.md
      - Mesh: render/mesh_class.md
      - Objects: render/obj_class.md
      - Shader Program: render/shader.md
      - Sky Box: render/sky_box.md
    - UI:
      - Console: ui/console.md
      - Text Renderer:
        - Renderer: ui/text/renderer.md
        - Rich Text: ui/text/rich.md
    - Scripts:
      - Scripts: scripts/script.md
    - Utils:
      - Config: utils/config.md

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - attr_list
  - md_in_html